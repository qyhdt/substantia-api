# SPA：任何未命中静态文件的路径都回 index.html（前端路由）。
# 不在这里处理 /api —— 由上游 edge-nginx 直接把 /api/ 反代到 backend。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源长缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
